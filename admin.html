<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Game 통계</title>
    <style>
        :root {
            --primary-color: #6366F1;
            --success-color: #10B981;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
            --radius: 12px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: #0F172A;
                --surface: #1E293B;
                --border: #334155;
                --text-primary: #F1F5F9;
                --text-secondary: #94A3B8;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 8px;
        }

        .wrap {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            position: relative;
            background: var(--surface);
            padding: 30px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            text-align: center;
            margin-bottom: 16px;
        }

        .sheet-link {
            position: absolute;
            top: 14px;
            right: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .sheet-link:hover {
            background-color: var(--background);
            color: var(--primary-color);
        }

        .sheet-link svg {
            width: 24px;
            height: 24px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary-color), #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .summary {
            color: var(--text-secondary);
            font-size: 0.95em;
            margin-bottom: 20px;
        }

        .refresh-btn {
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius);
            background-color: var(--primary-color);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover:not(:disabled) {
            background-color: #4F46E5;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .sync-btn {
            padding: 10px 24px;
            border: 1px solid var(--primary-color);
            border-radius: var(--radius);
            background-color: transparent;
            color: var(--primary-color);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sync-btn:hover:not(:disabled) {
            background-color: var(--background);
        }

        .sync-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .q-card {
            background: var(--surface);
            padding: 24px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            margin-bottom: 16px;
        }

        .q-text {
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--text-primary);
        }

        .opt {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .opt-label { color: var(--text-primary); }

        .opt-label .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 0.78em;
            font-weight: 700;
            color: white;
            margin-right: 8px;
            vertical-align: middle;
        }

        .badge-a { background-color: var(--primary-color); }
        .badge-b { background-color: var(--success-color); }

        .opt-count {
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .opt-count.clickable {
            cursor: pointer;
            color: var(--primary-color);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .opt-count.clickable:hover { opacity: 0.7; }

        .opt-count .pct {
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.85em;
            margin-left: 6px;
            text-decoration: none;
            display: inline-block;
        }

        .bar {
            display: flex;
            height: 14px;
            border-radius: 7px;
            overflow: hidden;
            background-color: var(--border);
            margin-top: 14px;
        }

        .bar .seg-a { background-color: var(--primary-color); }
        .bar .seg-b { background-color: var(--success-color); }

        .no-response {
            color: var(--text-secondary);
            font-size: 0.9em;
            font-style: italic;
            margin-top: 6px;
        }

        .state {
            background: var(--surface);
            padding: 40px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            text-align: center;
            color: var(--text-secondary);
        }

        .spinner {
            border: 4px solid var(--border);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 팝업(모달) */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 1000;
        }

        .modal-overlay.show { display: flex; }

        .modal-box {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 380px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-size: 1.05em;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.6em;
            line-height: 1;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
        }

        .modal-body {
            padding: 16px 20px;
            overflow-y: auto;
        }

        .name-list { list-style: none; }

        .name-list li {
            padding: 10px 4px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }

        .name-list li:last-child { border-bottom: none; }

        .name-list .num {
            color: var(--text-secondary);
            margin-right: 10px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1Y2dqBgXPsiaicWc9hw7MFfHV4mRWWBVtk0-l041bnHI/edit?gid=0#gid=0" target="_blank" rel="noopener" title="구글시트 데이터 열기" aria-label="구글시트 데이터 열기">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="3" y1="15" x2="21" y2="15"></line>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                    <line x1="15" y1="3" x2="15" y2="21"></line>
                </svg>
            </a>
            <h1>Balance Game 통계</h1>
            <div class="summary" id="summary">데이터를 불러오는 중…</div>
            <button class="refresh-btn" id="refreshBtn" onclick="loadStats()">새로고침</button>
        </div>

        <div id="content">
            <div class="state">
                <div class="spinner"></div>
                <p>데이터를 불러오는 중…</p>
            </div>
        </div>
    </div>

    <!-- 명단 팝업 -->
    <div class="modal-overlay" id="modal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="modal-close" onclick="closeModal()" aria-label="닫기">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="config/config.js"></script>
    <script>
        // 집계 데이터를 보관 (팝업에서 명단 조회용)
        let statsData = { questions: [], names: {} };

        async function loadStats() {
            const content = document.getElementById('content');
            const summary = document.getElementById('summary');
            const btn = document.getElementById('refreshBtn');

            btn.disabled = true;
            content.innerHTML = '<div class="state"><div class="spinner"></div><p>데이터를 불러오는 중…</p></div>';

            try {
                const id = CONFIG.SPREADSHEET_ID;
                const key = CONFIG.API_KEY;
                const qUrl = `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/Questions!A2:F1000?key=${key}`;
                const fbUrl = `${CONFIG.FIREBASE_DB_URL}/results.json`;

                // 질문은 구글시트, 응답은 Firebase 에서 읽기
                const [qRes, fbRes] = await Promise.all([fetch(qUrl), fetch(fbUrl)]);
                const qData = await qRes.json();
                const fbData = await fbRes.json(); // {pushId: {name, questionId, choice, category, ts}} 또는 null

                // 질문 목록 (id -> 질문/보기)
                const questions = (qData.values || [])
                    .filter(row => row[0] && row[1])
                    .map(row => ({
                        id: row[0],
                        question: row[1],
                        a: row[2] || 'A',
                        b: row[3] || 'B'
                    }));

                // 결과 집계 (Firebase: 각 레코드 = {name, questionId, choice, category, ts})
                // names[qid] = { A: [이름...], B: [이름...] }
                const results = fbData ? Object.values(fbData) : [];
                const names = {};
                const students = new Set();

                results.forEach(rec => {
                    if (!rec) return;
                    const qid = rec.questionId;
                    const choice = (rec.choice || '').toString().trim().toUpperCase();
                    const name = (rec.name || '').toString().trim() || '(이름 없음)';
                    if (rec.name) students.add(name);
                    if (!qid) return;
                    if (!names[qid]) names[qid] = { A: [], B: [] };
                    if (choice === 'A') names[qid].A.push(name);
                    else if (choice === 'B') names[qid].B.push(name);
                });

                statsData = { questions, names };

                summary.textContent = `참여 학생 ${students.size}명 · 총 응답 ${results.length}건`;

                if (questions.length === 0) {
                    content.innerHTML = '<div class="state"><p>등록된 문항이 없습니다.</p></div>';
                    btn.disabled = false;
                    return;
                }

                // 화면 그리기
                const html = questions.map(q => {
                    const n = names[q.id] || { A: [], B: [] };
                    const cA = n.A.length;
                    const cB = n.B.length;
                    const total = cA + cB;
                    const pctA = total ? Math.round((cA / total) * 100) : 0;
                    const pctB = total ? 100 - pctA : 0;

                    const bar = total
                        ? `<div class="bar">
                               <div class="seg-a" style="width:${pctA}%"></div>
                               <div class="seg-b" style="width:${pctB}%"></div>
                           </div>`
                        : `<div class="no-response">아직 응답이 없습니다.</div>`;

                    const countA = cA > 0
                        ? `<span class="opt-count clickable" data-qid="${q.id}" data-choice="A">${cA}명<span class="pct">${pctA}%</span></span>`
                        : `<span class="opt-count">0명</span>`;
                    const countB = cB > 0
                        ? `<span class="opt-count clickable" data-qid="${q.id}" data-choice="B">${cB}명<span class="pct">${pctB}%</span></span>`
                        : `<span class="opt-count">0명</span>`;

                    return `
                        <div class="q-card">
                            <div class="q-text">${escapeHtml(q.question)}</div>
                            <div class="opt">
                                <span class="opt-label"><span class="badge badge-a">A</span>${escapeHtml(q.a)}</span>
                                ${countA}
                            </div>
                            <div class="opt">
                                <span class="opt-label"><span class="badge badge-b">B</span>${escapeHtml(q.b)}</span>
                                ${countB}
                            </div>
                            ${bar}
                        </div>
                    `;
                }).join('');

                content.innerHTML = html;
            } catch (error) {
                console.error(error);
                summary.textContent = '';
                content.innerHTML = '<div class="state"><p>데이터를 불러오지 못했습니다.<br>잠시 후 새로고침 버튼을 눌러 주세요.</p></div>';
            } finally {
                btn.disabled = false;
            }
        }

        // 숫자 클릭 -> 명단 팝업
        document.getElementById('content').addEventListener('click', e => {
            const el = e.target.closest('.opt-count.clickable');
            if (!el) return;
            openModal(el.dataset.qid, el.dataset.choice);
        });

        function openModal(qid, choice) {
            const q = statsData.questions.find(x => x.id === qid);
            if (!q) return;
            const list = (statsData.names[qid] && statsData.names[qid][choice]) || [];
            const optText = choice === 'A' ? q.a : q.b;

            document.getElementById('modalTitle').textContent =
                `${q.question} — ${optText} (${list.length}명)`;

            const body = document.getElementById('modalBody');
            if (list.length === 0) {
                body.innerHTML = '<p style="color:var(--text-secondary)">응답한 학생이 없습니다.</p>';
            } else {
                body.innerHTML = '<ul class="name-list">' +
                    list.map((name, i) =>
                        `<li><span class="num">${i + 1}.</span>${escapeHtml(name)}</li>`
                    ).join('') +
                    '</ul>';
            }

            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            // 닫기 버튼, 오버레이 배경 클릭, ESC 키에서 호출됨
            // (modal-box 내부 클릭은 stopPropagation 으로 막혀 있음)
            document.getElementById('modal').classList.remove('show');
        }

        // ESC 키로 닫기
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
